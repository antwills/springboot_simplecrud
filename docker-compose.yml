# version: '3.8'
# docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    container_name: simplecrud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simplecrud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  app:
    build: .
    container_name: simplecrud-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/simplecrud
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    # Essa linha é OBRIGATÓRIA para o nome "db" funcionar
    networks:
      - app-network

  # Força os dois serviços ficarem na mesma network
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:  # Volume nomeado para persistência