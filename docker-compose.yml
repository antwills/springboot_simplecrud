version: '3.8'

services:
  postgres:
    image: postgres:17-alpine  # Versão leve e atual (17 é compatível com Java 25)
    container_name: simplecrud-postgres
    environment:
      POSTGRES_DB: simplecrud  # Nome do banco (ajuste se diferente)
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678  # Senha (combine com application.properties)
    ports:
      - "5432:5432"  # Expõe no host para ferramentas como pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persiste dados
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simplecrud"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .  # Usa o Dockerfile que criamos antes
    container_name: simplecrud-app
    ports:
      - "8080:8080"  # App na porta 8080
    environment:
      SPRING_PROFILES_ACTIVE: docker  # Opcional: use um perfil para Docker
    depends_on:
      postgres:
        condition: service_healthy  # Espera o DB estar pronto
    volumes:
      - .:/app  # Opcional: para hot-reload em dev (monte o src)

volumes:
  postgres_data:  # Volume nomeado para persistência